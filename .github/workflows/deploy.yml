name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish src/GrammarGame/GrammarGame.csproj -c Release -o output

      - name: Set base path for GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/GrammarGame/" />|' output/wwwroot/index.html

      - name: Inject build info
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|commit: \"dev\"|commit: \"${SHORT_SHA}\"|" output/wwwroot/index.html
          sed -i "s|build: \"local\"|build: \"#${{ github.run_number }}\"|" output/wwwroot/index.html

      - name: Add .nojekyll
        run: touch output/wwwroot/.nojekyll

      - name: Copy index.html to 404.html for SPA routing
        run: cp output/wwwroot/index.html output/wwwroot/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

      - id: deployment
        uses: actions/deploy-pages@v4
